# ============================================================
# PTP Grandmaster Systemd Services
# Server: Intel Xeon Gold 6438N / Intel E810 NIC
# Interface: enp111s0f0 (E810 fronthaul port)
# ============================================================

# ---- FILE 1: /etc/systemd/system/ptp4l-e810.service ----
# Runs ptp4l as PTP Grandmaster for O-RAN fronthaul sync
# Config file: /etc/linuxptp/e810-gm.cfg

[Unit]
Description=PTP4L Grandmaster on Intel E810 (O-RAN DU)
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
ExecStart=/usr/sbin/ptp4l -f /etc/linuxptp/e810-gm.cfg -i enp111s0f0
Restart=always
RestartSec=2

[Install]
WantedBy=multi-user.target


# ---- FILE 2: /etc/systemd/system/phc2sys-e810.service ----
# Syncs the system CLOCK_REALTIME to the E810 hardware PTP clock
# Requires ptp4l to be running first

[Unit]
Description=PHC2SYS syncing system clock to E810 hardware clock
After=ptp4l-e810.service
Requires=ptp4l-e810.service

[Service]
Type=simple
ExecStart=/usr/sbin/phc2sys -s /dev/ptp0 -c CLOCK_REALTIME -O 0 -m
Restart=always
RestartSec=2

[Install]
WantedBy=multi-user.target
