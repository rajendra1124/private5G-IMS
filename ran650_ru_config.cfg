# ============================================================
# Benetel RAN650 Radio Unit Configuration
# Testbed : Private 5G SA, Mason Innovation Lab, George Mason University
# File    : /etc/ru_config.cfg  (on RAN650 management OS)
# SW Ver  : RAN650-1v1.4.0-NM-5561771
# ============================================================

# MIMO mode
# 4T2R: 4 transmit / 2 receive — ports 1,2,3,4 TX; ports 1,2 RX
mimo_mode=1_2_3_4_4x2

# FPGA downlink scaling (0 = no attenuation)
downlink_scaling=0

# PRACH format: short (A-format, for 30 kHz SCS TDD)
prach_format=short

# PRACH frequency offset: dynamic (read from C-Plane sectionType3)
prach_freq_offset_dynamic=true
prach_freq_offset=0

# IQ Compression: dynamic compressed (9-bit BFP)
# Note: uncompressed is NOT supported in 4x2/4x4 mode
compression=dynamic_compressed

# Long-form PRACH compression: disabled
lf_prach_compression_enable=false

# PRACH msg1 frequency start (set dynamically via C-Plane)
prach_msg1_freq_start=0

# C-Plane per-symbol workaround: disabled
cplane_per_symbol_workaround=disabled

# CU/U-Plane DL coupling via section ID: disabled
cuplane_dl_coupling_sectionID=disabled

# FlexRAN PRACH workaround: disabled (not a FlexRAN deployment)
flexran_prach_workaround=disabled

# DPD reset timer: every 12 hours (43200 seconds)
dpd_reset_timer=43200

# ============================================================
# Fronthaul MAC / VLAN — must match srsRAN gNB config
# DU MAC = VF0 MAC of Intel E810 NIC on the server
# ============================================================
c_plane_du_mac=00:33:22:33:00:11
u_plane_du_mac=00:33:22:33:00:11

# VLAN tag for all fronthaul traffic (C-Plane and U-Plane)
# Matches gNB config: vlan_tag_cp=5, vlan_tag_up=5
u_plane_du_vlan_uplink=5
u_plane_du_vlan_downlink=5
c_plane_du_vlan=5

# TDD switching offset (contact Benetel support before modifying)
tdd_switching=1500

# ============================================================
# RF Configuration
# ============================================================

# Channel bandwidth: 80 MHz
bandwidth_hz=80000000

# Center frequency: 3558.18 MHz (ARFCN 637212, n78)
centre_frequency_hz=3558180000

# Transmit power: 24 dBm per port
tx_power_dbm=24.000000

# ============================================================
# TDD Pattern
# Combined pattern: DDDDDDDSUU (10ms, matches srsRAN tdd_ul_dl_cfg)
#   tdd_pattern_1 = DDDD   (first 4 slots: all DL)
#   tdd_pattern_2 = DDDSUU (next 6 slots: DL, DL, DL, Special, UL, UL)
# ============================================================
tdd_pattern_1=DDDD
tdd_pattern_2=DDDSUU

# Special slot symbol layout: 6 DL + 4 Guard + 4 UL (14 symbols total)
# Matches srsRAN: nof_dl_symbols=6, nof_ul_symbols=4
special_slots_symbols=DDDDDDGGGGUUUU
special_slots_symbols1=
special_slots_symbols2=

# LF PRACH slot ID
lf_prach_slot_id=0

# DL special slot fine tuning (internal, do not modify without Benetel guidance)
dl_tuning_special_slot=0x13b6

# C-Plane timing reference: per-slot (not per-symbol)
cplane_per_symbol_timing=false

# Non-ideal C4 timing fix: disabled
non_ideal_c4_timing_enable=false

# M-Plane array carrier v16.01 behavior: disabled
m_plane_u_plane_config_v16=false

# ============================================================
# PTP Synchronization (uncomment to enable M-Plane PTP config)
# The E810 NIC on the DU server acts as PTP Grandmaster (G.8275.1)
# The RAN650 locks to it via the fronthaul VLAN
# ============================================================
#sync_enable=false
#ptp_enable=true
#ptp_domain=24
#ptp_profile=G.8275.1
